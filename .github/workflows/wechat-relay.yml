name: WeChat Relay
on:
  repository_dispatch:
    types: [wechat-publish]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish
        env:
          APPID: ${{ secrets.WECHAT_APPID }}
          SECRET: ${{ secrets.WECHAT_SECRET }}
          ARTICLE: ${{ github.event.client_payload.article }}
          TITLE: ${{ github.event.client_payload.title }}
        run: |
          TOKEN=$(curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${APPID}&secret=${SECRET}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
          echo "TOKEN_OK=${#TOKEN}"
          
          # Create draft
          DRAFT=$(python3 -c "
import json, urllib.request, os, sys
t = os.environ['TOKEN']
article = os.environ.get('ARTICLE', '')
title = os.environ.get('TITLE', '')
body = {'articles': [{'title': title, 'author': '何自刚', 'digest': title[:120], 'content': article, 'need_open_comment': 0, 'only_fans_can_comment': 0}]}
url = f'https://api.weixin.qq.com/cgi-bin/draft/add?access_token={t}'
req = urllib.request.Request(url, data=json.dumps(body, ensure_ascii=False).encode('utf-8'), headers={'Content-Type': 'application/json'})
resp = json.loads(urllib.request.urlopen(req).read())
print(resp.get('media_id', json.dumps(resp)))
")
          echo "DRAFT_ID=$DRAFT"
          
          # Submit/publish
          PUB=$(python3 -c "
import json, urllib.request, os
t = os.environ['TOKEN']
did = '$DRAFT'
url = f'https://api.weixin.qq.com/cgi-bin/draft/submit?access_token={t}'
req = urllib.request.Request(url, data=json.dumps({'media_id': did}).encode('utf-8'), headers={'Content-Type': 'application/json'})
resp = json.loads(urllib.request.urlopen(req).read())
print(json.dumps(resp))
")
          echo "PUBLISH=$PUB"
          echo "publish_id=$(echo $PUB | python3 -c 'import sys,json; print(json.load(sys.stdin).get('publish_id',''))')" >> $GITHUB_OUTPUT
