name: WeChat Relay
on: [repository_dispatch]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Publish
        env:
          APPID: ${{ secrets.WECHAT_APPID }}
          SECRET: ${{ secrets.WECHAT_SECRET }}
        run: |
          echo "start"
          curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${APPID}&secret=${SECRET}" | head -c 200
