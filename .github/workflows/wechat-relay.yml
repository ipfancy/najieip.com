name: WeChat Relay
on: [repository_dispatch]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Event type: ${{ github.event.action }}"
      - name: Publish Article
        if: github.event.action == 'publish'
        env:
          APPID: ${{ secrets.WECHAT_APPID }}
          SECRET: ${{ secrets.WECHAT_SECRET }}
        run: |
          echo "Getting WeChat token..."
          RESP=$(curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${APPID}&secret=${SECRET}")
          echo "Response: $RESP"
