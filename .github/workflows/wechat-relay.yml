name: WeChat Relay
on:
  repository_dispatch:
    types: [publish]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Call WeChat API
        env:
          APPID: ${{ secrets.WECHAT_APPID }}
          SECRET: ${{ secrets.WECHAT_SECRET }}
        run: |
          echo "starting..."
          curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${APPID}&secret=${SECRET}"
