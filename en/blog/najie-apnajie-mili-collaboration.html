<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="NaJie IP, APNaJie Patent Agency, and MiLi Law Firm join forces to deliver end-to-end IP and legal support — from patent filing to litigation, always within reach.">
<title>Tri-Firm Alliance | NaJie × APNaJie × MiLi: Legal Support, Always Within Reach — 爱普纳杰专利所</title>

<style>
:root { --primary: #1F4E79; --accent: #C0A060; --text: #333; --text-light: #666; --bg: #F8F9FA; --white: #fff; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif; color: var(--text); line-height:1.9; }
header { background: var(--primary); padding: 20px 48px; text-align:center; }
header a { color: var(--white); text-decoration:none; font-size:20px; font-weight:700; }
header a:hover { color: var(--accent); }
.container { max-width: 740px; margin: 0 auto; padding: 48px 24px; }
article h1 { font-size:32px; color: var(--primary); margin-bottom:8px; line-height:1.3; }
article .meta { font-size:14px; color: var(--text-light); margin-bottom:32px; }
article h2 { font-size:22px; color: var(--primary); margin: 40px 0 12px; padding-bottom:6px; border-bottom:2px solid var(--accent); }
article p { margin-bottom:16px; font-size:16px; }
article ul, article ol { margin: 12px 0 12px 24px; }
article li { margin-bottom:6px; }
article strong { color: var(--primary); }
article a { color: var(--primary); text-decoration:underline; }
article blockquote { background: #fefce8; border-left:4px solid var(--accent); padding:12px 20px; margin:20px 0; font-style:italic; }
article table { width:100%; border-collapse:collapse; margin:16px 0; }
article th, article td { border:1px solid #e5e7eb; padding:10px 14px; text-align:left; }
article th { background:#f0f4ff; font-weight:600; }
article td:first-child { font-weight:600; }
.cta { background: linear-gradient(135deg, var(--primary), #2E75B6); color: var(--white); padding:32px; border-radius:12px; margin-top:40px; text-align:center; }
.cta p { margin-bottom:16px; font-size:17px; }
.cta a { display:inline-block; background:var(--accent); color:var(--white); padding:12px 28px; border-radius:8px; text-decoration:none; font-weight:600; font-size:16px; }
.cta a:hover { background:#D4B87A; }
.entity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 20px 0; }
.entity-card { background: var(--white); border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; text-align: center; transition: all 0.3s; }
.entity-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-color: var(--accent); }
.entity-card .icon { font-size: 40px; margin-bottom: 12px; }
.entity-card h3 { font-size: 18px; color: var(--primary); margin-bottom: 8px; }
.entity-card p { font-size: 14px; color: var(--text-light); margin-bottom: 0; }
.synergy-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; }
.synergy-table th { background: var(--primary); color: var(--white); padding: 12px 16px; text-align: center; }
.synergy-table td { border: 1px solid #e5e7eb; padding: 10px 14px; vertical-align: top; }
.synergy-table td:first-child { background: #f0f4ff; font-weight: 600; text-align: center; width: 25%; }
footer { background:#1a1a2e; color:rgba(255,255,255,0.6); padding:32px; text-align:center; font-size:13px; margin-top:48px; }
footer a { color: var(--accent); text-decoration:none; }
</style>
